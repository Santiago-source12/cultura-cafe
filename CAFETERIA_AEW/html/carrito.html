<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<title>Carrito Cultura Café</title>

<link rel="stylesheet" href="../css/carrito.css">
<link rel="stylesheet" href="../css/menu.css">

</head>


<body>

<div id="menu"></div>


<script>


fetch("../componentes/menu.html")

.then(res=>res.text())

.then(data=>{

document.getElementById("menu").innerHTML=data;

});


</script>


<header>


<h1>
🛒 Carrito Cultura Café
</h1>


<p>
Revisa tus productos antes de comprar
</p>


</header>





<section class="carrito">


<h2>
Productos seleccionados
</h2>


<div id="productosCarrito">

</div>



<h2 id="total">

Total: S/ 0.00

</h2>



<button onclick="abrirPago()">

Ir a pagar

</button>


</section>

<div id="ventanaPago" class="modal">


<div class="contenidoPago">


<h2>
Pago Cultura Café ☕
</h2>



<label>
Nombre completo
</label>

<input type="text" placeholder="Ingresa tu nombre">



<label>
Correo electrónico
</label>

<input type="email" placeholder="correo@gmail.com">



<h3>
Pago con tarjeta 💳
</h3>



<label>
Número de tarjeta
</label>

<input 
type="text" 
placeholder="0000 0000 0000 0000">



<label>
Fecha de vencimiento
</label>

<input 
type="text" 
placeholder="MM/AA">



<label>
CVV
</label>

<input 
type="password" 
placeholder="***">





<button onclick="confirmarPago()">

Confirmar pago

</button>



</div>


</div>

<script src="../js/carrito.js"></script>


</body>

</html>
